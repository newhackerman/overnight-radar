services:
  app:
    build: .
    container_name: overnight-radar
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override to point to host MySQL, not a container DB
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      APP_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://127.0.0.1:8000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
